name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: vscode-linux-x64
            allow_failure: false
          - os: ubuntu-latest
            target: vscode-linux-arm64
            allow_failure: true
          - os: ubuntu-latest
            target: vscode-linux-armhf
            allow_failure: true
          - os: windows-latest
            target: vscode-win32-x64
            allow_failure: false
          - os: windows-latest
            target: vscode-win32-arm64
            allow_failure: true
          - os: macos-13
            target: vscode-darwin-x64
            allow_failure: false
          - os: macos-14
            target: vscode-darwin-arm64
            allow_failure: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Fetch built-in VSIX
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/fetch-builtin-vsix.mjs

      - name: Build
        run: npm run gulp ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ../VSCode-*
