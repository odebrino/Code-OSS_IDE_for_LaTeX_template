name: Build Artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: build-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: vscode-linux-x64
            allow_failure: false
          - os: ubuntu-latest
            target: vscode-linux-arm64
            allow_failure: true
          - os: ubuntu-latest
            target: vscode-linux-armhf
            allow_failure: true
          - os: windows-latest
            target: vscode-win32-x64
            allow_failure: false
          - os: windows-latest
            target: vscode-win32-arm64
            allow_failure: true
          - os: macos-13
            target: vscode-darwin-x64
            allow_failure: false
          - os: macos-14
            target: vscode-darwin-arm64
            allow_failure: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch built-in VSIX
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/fetch-builtin-vsix.mjs

      - name: Build
        run: npm run gulp ${{ matrix.target }}

      - name: Prepare release metadata
        id: release_meta
        run: node scripts/prepare-release-artifact.mjs --target ${{ matrix.target }} --skip-fetch --skip-build

      - name: Attest build provenance
        if: ${{ github.event.repository.private == false || vars.ENABLE_PRIVATE_ARTIFACT_ATTESTATION == 'true' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.release_meta.outputs.archive_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.artifact_name }}
          path: |
            ${{ steps.release_meta.outputs.archive_path }}
            ${{ steps.release_meta.outputs.checksum_path }}
            ${{ steps.release_meta.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 14
